<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Check-in / チェックイン</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body class="guest-body">

  <main class="guest-main">

    <!-- ===== 言語選択画面 ===== -->
    <section id="langSelect" class="lang-select-screen">
      <div class="property-name">CASA VERDE</div>
      <h1 class="lang-select-title">ようこそ / Welcome</h1>
      <p class="lang-select-sub">言語を選択してください / Please select your language</p>
      <div class="lang-grid">
        <button class="lang-card" onclick="selectLang('ja')">
          <span class="lang-flag">🇯🇵</span>
          <span class="lang-name">日本語</span>
          <span class="lang-native">Japanese</span>
        </button>
        <button class="lang-card" onclick="selectLang('en')">
          <span class="lang-flag">🇺🇸</span>
          <span class="lang-name">English</span>
          <span class="lang-native">英語</span>
        </button>
        <button class="lang-card" onclick="selectLang('ko')">
          <span class="lang-flag">🇰🇷</span>
          <span class="lang-name">한국어</span>
          <span class="lang-native">Korean</span>
        </button>
        <button class="lang-card" onclick="selectLang('zh')">
          <span class="lang-flag">🇨🇳</span>
          <span class="lang-name">中文</span>
          <span class="lang-native">Chinese</span>
        </button>
        <button class="lang-card" onclick="selectLang('fr')">
          <span class="lang-flag">🇫🇷</span>
          <span class="lang-name">Français</span>
          <span class="lang-native">French</span>
        </button>
        <button class="lang-card" onclick="selectLang('es')">
          <span class="lang-flag">🇪🇸</span>
          <span class="lang-name">Español</span>
          <span class="lang-native">Spanish</span>
        </button>
      </div>
    </section>

    <!-- ===== チェックイン画面 ===== -->
    <div id="checkinScreen" class="hidden">

      <!-- 言語切り替え（小さく） -->
      <div class="lang-switcher-mini" onclick="showLangSelect()">
        <span id="currentLangFlag">🇯🇵</span>
        <span id="currentLangName">日本語</span>
        <span>▾</span>
      </div>

      <!-- ヘッダー -->
      <header class="guest-header">
        <div class="property-name">CASA VERDE</div>
        <h1 class="guest-title" data-i18n="title"></h1>
        <p class="guest-sub" data-i18n="subtitle"></p>
      </header>

      <!-- ステップインジケーター -->
      <div class="step-indicator">
        <div class="step active" data-step="1">
          <div class="step-dot"><span>1</span></div>
          <div class="step-label" data-i18n="step1"></div>
        </div>
        <div class="step-line"></div>
        <div class="step" data-step="2">
          <div class="step-dot"><span>2</span></div>
          <div class="step-label" data-i18n="step2"></div>
        </div>
        <div class="step-line"></div>
        <div class="step" data-step="3">
          <div class="step-dot"><span>3</span></div>
          <div class="step-label" data-i18n="step3"></div>
        </div>
        <div class="step-line"></div>
        <div class="step" data-step="4">
          <div class="step-dot"><span>4</span></div>
          <div class="step-label" data-i18n="step4"></div>
        </div>
      </div>

      <!-- ステップ 1: 基本情報 -->
      <section class="form-panel" id="step1">
        <h2 class="panel-title" data-i18n="step1_title"></h2>
        <div class="form-grid">
          <div class="field full">
            <label data-i18n="field_name"></label>
            <input type="text" id="guestName" autocomplete="name"/>
          </div>
          <div class="field">
            <label data-i18n="field_nationality"></label>
            <select id="nationality">
              <option value="">---</option>
              <option value="JP">🇯🇵 日本 / Japan</option>
              <option value="US">🇺🇸 アメリカ / USA</option>
              <option value="CN">🇨🇳 中国 / China</option>
              <option value="KR">🇰🇷 韓国 / Korea</option>
              <option value="TW">🇹🇼 台湾 / Taiwan</option>
              <option value="HK">🇭🇰 香港 / Hong Kong</option>
              <option value="FR">🇫🇷 フランス / France</option>
              <option value="DE">🇩🇪 ドイツ / Germany</option>
              <option value="GB">🇬🇧 英国 / UK</option>
              <option value="AU">🇦🇺 オーストラリア / Australia</option>
              <option value="ES">🇪🇸 スペイン / Spain</option>
              <option value="OTHER">その他 / Other</option>
            </select>
          </div>
          <div class="field">
            <label data-i18n="field_dob"></label>
            <input type="date" id="dob"/>
          </div>
          <div class="field">
            <label data-i18n="field_checkin"></label>
            <input type="date" id="checkinDate"/>
          </div>
          <div class="field">
            <label data-i18n="field_checkout"></label>
            <input type="date" id="checkoutDate"/>
          </div>
          <div class="field">
            <label data-i18n="field_guests"></label>
            <input type="number" id="guestCount" min="1" max="20" value="1"/>
          </div>
          <div class="field">
            <label data-i18n="field_room"></label>
            <select id="roomNumber">
              <option value="">---</option>
              <option value="101">101</option>
              <option value="102">102</option>
              <option value="103">103</option>
              <option value="104">104</option>
              <option value="201">201</option>
              <option value="202">202</option>
              <option value="203">203</option>
              <option value="204">204</option>
            </select>
          </div>
          <div class="field full">
            <label data-i18n="field_emergency"></label>
            <input type="tel" id="emergencyContact" placeholder="+81-90-0000-0000"/>
          </div>
        </div>
        <button class="btn-next" onclick="nextStep(2)" data-i18n="btn_next"></button>
      </section>

      <!-- ステップ 2: 身分証スキャン -->
      <section class="form-panel hidden" id="step2">
        <h2 class="panel-title" data-i18n="step2_title"></h2>
        <p class="panel-note" data-i18n="step2_note"></p>
        <div class="camera-box" id="idCameraBox">
          <video id="idVideo" autoplay muted playsinline></video>
          <canvas id="idCanvas" class="hidden"></canvas>
          <div class="camera-frame id-frame">
            <div class="corner tl"></div><div class="corner tr"></div>
            <div class="corner bl"></div><div class="corner br"></div>
            <span class="frame-label" data-i18n="id_frame_label"></span>
          </div>
          <img id="idPreview" class="preview-img hidden" alt="ID preview"/>
        </div>
        <div class="camera-controls">
          <button class="btn-camera hidden" id="startIdCamera" onclick="startCamera('id')" data-i18n="btn_camera"></button>
          <button class="btn-shoot hidden" id="shootId" onclick="capture('id')" data-i18n="btn_capture"></button>
          <button class="btn-retry hidden" id="retryId" onclick="retryCapture('id')" data-i18n="btn_retry"></button>
        </div>
        <div class="step-nav">
          <button class="btn-back" onclick="nextStep(1)" data-i18n="btn_back"></button>
          <button class="btn-next" id="step2Next" onclick="nextStep(3)" data-i18n="btn_next"></button>
        </div>
      </section>

      <!-- ステップ 3: 顔写真 -->
      <section class="form-panel hidden" id="step3">
        <h2 class="panel-title" data-i18n="step3_title"></h2>
        <p class="panel-note" data-i18n="step3_note"></p>
        <div class="camera-box" id="faceCameraBox">
          <video id="faceVideo" autoplay muted playsinline></video>
          <canvas id="faceCanvas" class="hidden"></canvas>
          <div class="camera-frame face-frame">
            <div class="face-oval"></div>
            <span class="frame-label" data-i18n="face_frame_label"></span>
          </div>
          <img id="facePreview" class="preview-img hidden" alt="Face preview"/>
        </div>
        <div class="camera-controls">
          <button class="btn-camera hidden" id="startFaceCamera" onclick="startCamera('face')" data-i18n="btn_camera"></button>
          <button class="btn-shoot hidden" id="shootFace" onclick="capture('face')" data-i18n="btn_capture"></button>
          <button class="btn-retry hidden" id="retryFace" onclick="retryCapture('face')" data-i18n="btn_retry"></button>
        </div>
        <div class="step-nav">
          <button class="btn-back" onclick="nextStep(2)" data-i18n="btn_back"></button>
          <button class="btn-next" id="step3Next" onclick="nextStep(4)" data-i18n="btn_next"></button>
        </div>
      </section>

      <!-- ステップ 4: 確認 -->
      <section class="form-panel hidden" id="step4">
        <h2 class="panel-title" data-i18n="step4_title"></h2>
        <div class="confirm-grid" id="confirmGrid"></div>
        <div class="confirm-photos">
          <div class="confirm-photo-wrap">
            <p data-i18n="label_id_photo"></p>
            <img id="confirmId" class="confirm-photo"/>
          </div>
          <div class="confirm-photo-wrap">
            <p data-i18n="label_face_photo"></p>
            <img id="confirmFace" class="confirm-photo"/>
          </div>
        </div>
        <label class="agree-check">
          <input type="checkbox" id="agreeCheck"/>
          <span data-i18n="agree_text"></span>
        </label>
        <div class="submit-status hidden" id="submitStatus"></div>
        <div class="step-nav">
          <button class="btn-back" onclick="nextStep(3)" data-i18n="btn_back"></button>
          <button class="btn-submit" id="submitBtn" onclick="submitCheckin()" data-i18n="btn_submit"></button>
        </div>
      </section>

      <!-- 完了画面 -->
      <section class="form-panel hidden" id="stepDone">
        <div class="done-wrap">
          <div class="done-icon">✓</div>
          <h2 data-i18n="done_title"></h2>
          <p data-i18n="done_msg"></p>
          <div class="done-room" id="doneRoom"></div>
          <button class="btn-next" style="margin-top:2rem;" onclick="resetForm()" data-i18n="btn_restart"></button>
        </div>
      </section>

    </div><!-- /checkinScreen -->

  </main>

  <script src="https://cdn.jsdelivr.net/npm/opencv.js@1.2.1/opencv.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/checkin.js"></script>
  <script src="js/sheets.js"></script>
</body>
</html>
